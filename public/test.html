<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: red; height: 100vh; margin: 0;}
  .box { padding: 20px; background: white; border-radius: 10px; margin: 50px; font-size: 40px; display: inline-block; filter: url(#pixelate); }
</style>
</head>
<body>
  <div class="box">HELLO PIXELS</div>
  <svg style="position:absolute; width:0; height:0;">
    <filter id="pixelate" x="0" y="0">
      <feFlood x="2" y="2" height="1" width="1"/>
      <feComposite width="4" height="4"/>
      <feTile result="a"/>
      <feComposite in="SourceGraphic" in2="a" operator="in"/>
      <feMorphology operator="dilate" radius="2"/>
    </filter>
  </svg>
</body>
</html>
